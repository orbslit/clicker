<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 Orbs Clicker</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    .counter {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 800;
      letter-spacing: -2px;
      margin-bottom: 2rem;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #ff6b6b, #ff8e53, #ff6b6b);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradient 3s ease infinite;
      transition: transform 0.1s ease;
    }

    .counter.bump {
      transform: scale(1.1);
    }

    @keyframes gradient {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .label {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 4px;
      color: #666;
      margin-bottom: 3rem;
    }

    .click-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 35% 35%, #ff8e53, #ff4444);
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow: 0 0 60px rgba(255, 68, 68, 0.3), 0 10px 30px rgba(0,0,0,0.5);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .click-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 80px rgba(255, 68, 68, 0.5), 0 10px 40px rgba(0,0,0,0.5);
    }

    .click-btn:active {
      transform: scale(0.95);
      box-shadow: 0 0 40px rgba(255, 68, 68, 0.2), 0 5px 15px rgba(0,0,0,0.5);
    }

    .status {
      position: fixed;
      bottom: 2rem;
      font-size: 0.8rem;
      color: #444;
    }

    .status .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #444;
      margin-right: 6px;
      vertical-align: middle;
    }

    .status .dot.online { background: #4ade80; }
    .status .dot.offline { background: #f87171; }

    .particle {
      position: fixed;
      pointer-events: none;
      font-size: 1.5rem;
      animation: float 1s ease-out forwards;
    }

    @keyframes float {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(0.5); }
    }

    .ripple {
      position: fixed;
      border-radius: 50%;
      border: 2px solid rgba(255, 100, 100, 0.4);
      pointer-events: none;
      animation: ripple-out 0.6s ease-out forwards;
    }

    @keyframes ripple-out {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    .branding {
      position: fixed;
      top: 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="branding">ORBS</div>
  <div class="counter" id="counter">—</div>
  <div class="label">total clicks</div>
  <button class="click-btn" id="clickBtn">CLICK</button>
  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">connecting...</span>
  </div>

  <script>
    const STORAGE_KEY = 'orbs-clicker';
    const API_BASE = 'https://api.counterapi.dev/v1';
    const NAMESPACE = 'orbslit-clicker';
    const COUNTER_NAME = 'global-clicks';

    const counterEl = document.getElementById('counter');
    const btn = document.getElementById('clickBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    let currentCount = 0;
    let online = false;

    function formatNumber(n) {
      return n.toLocaleString();
    }

    function setStatus(isOnline) {
      online = isOnline;
      statusDot.className = 'dot ' + (isOnline ? 'online' : 'offline');
      statusText.textContent = isOnline ? 'live' : 'offline — using local count';
    }

    function updateDisplay(n, animate = false) {
      currentCount = n;
      counterEl.textContent = formatNumber(n);
      if (animate) {
        counterEl.classList.add('bump');
        setTimeout(() => counterEl.classList.remove('bump'), 100);
      }
    }

    function spawnParticle(x, y) {
      const emojis = ['+1', '🔥', '⚡', '✨', '💥'];
      const el = document.createElement('div');
      el.className = 'particle';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      el.style.left = (x + (Math.random() - 0.5) * 60) + 'px';
      el.style.top = (y - 20) + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1000);
    }

    function spawnRipple(x, y) {
      const el = document.createElement('div');
      el.className = 'ripple';
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.transform = 'translate(-50%, -50%)';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 600);
    }

    async function fetchCount() {
      try {
        const res = await fetch(`${API_BASE}/${NAMESPACE}/${COUNTER_NAME}`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        setStatus(true);
        return data.count || 0;
      } catch {
        // Try to create the counter if it doesn't exist
        try {
          const res = await fetch(`${API_BASE}/${NAMESPACE}/${COUNTER_NAME}/up`);
          if (res.ok) {
            const data = await res.json();
            setStatus(true);
            return data.count || 0;
          }
        } catch {}
        setStatus(false);
        return parseInt(localStorage.getItem(STORAGE_KEY) || '0');
      }
    }

    async function incrementCount() {
      try {
        const res = await fetch(`${API_BASE}/${NAMESPACE}/${COUNTER_NAME}/up`);
        if (!res.ok) throw new Error('fail');
        const data = await res.json();
        setStatus(true);
        localStorage.setItem(STORAGE_KEY, data.count);
        return data.count;
      } catch {
        setStatus(false);
        const local = parseInt(localStorage.getItem(STORAGE_KEY) || '0') + 1;
        localStorage.setItem(STORAGE_KEY, local);
        return local;
      }
    }

    btn.addEventListener('click', async (e) => {
      const x = e.clientX;
      const y = e.clientY;
      
      spawnParticle(x, y);
      spawnRipple(x, y);
      
      // Optimistic update
      updateDisplay(currentCount + 1, true);
      
      const newCount = await incrementCount();
      updateDisplay(newCount);
    });

    // Init
    (async () => {
      const count = await fetchCount();
      updateDisplay(count);
    })();

    // Poll for updates from other users every 5s
    setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/${NAMESPACE}/${COUNTER_NAME}`);
        if (res.ok) {
          const data = await res.json();
          setStatus(true);
          if (data.count > currentCount) {
            updateDisplay(data.count, true);
          }
        }
      } catch {
        setStatus(false);
      }
    }, 5000);
  </script>
</body>
</html>
